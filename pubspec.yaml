name: orbix
description: "A new Flutter project."

publish_to: 'none'

version: 1.2.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  get: ^4.7.3
  get_storage: ^2.1.1
  iconsax: ^0.0.8
  intl: ^0.20.2
  google_fonts: ^8.1.0
  font_awesome_flutter: ^11.0.0
  dotted_border: ^3.1.0
  better_player_plus: ^1.3.4
  supabase_flutter: ^2.15.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/
    - assets/videos/
    - assets/icons/
